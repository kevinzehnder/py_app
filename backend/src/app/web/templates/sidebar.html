<!-- Collapsible sidebar. Toggled by the header menu button (showSidebar),
     persisted to localStorage. Replace the placeholder panels below. -->
<div class="sidebar padding" x-show="showSidebar" x-transition.opacity.duration.40ms>
  <article>
    <b>Panel</b>
    <p style="font-size: 0.85rem; color: var(--on-surface-variant);">
      Sidebar content goes here.
    </p>
  </article>

  <div class="divider"></div>
