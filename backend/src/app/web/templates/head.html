<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" shrink-to-fit="no" />
  <title>{% block title %}{{ app_name | default("App") }}{% endblock %}</title>
  <link rel="icon" href="/web/static/favicon.png" type="image/png" />

  <!-- beercss -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.11.33/dist/cdn/beer.min.js"></script>

  <!-- material dynamic colors -->
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/material-dynamic-colors@1.1.2/dist/cdn/material-dynamic-colors.min.js"></script>

  <!-- custom css -->
  <link rel="stylesheet" href="/web/static/main.css" />

  <!-- alpineJS with Focus plugin -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- htmx -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6/dist/htmx.min.js"
    integrity="sha384-Akqfrbj/HpNVo8k11SXBb6TlBWmXXlYQrCSqEWmyKJe+hDm3Z/B2WVG4smwBkRVm"
    crossorigin="anonymous"></script>

  <!-- alpine components (theme toggle store + snackbar) -->
  <script src="/web/static/ui.js"></script>
</head>
